<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>低空巡检系统 - 3D城市可视化</title>

    <!-- CesiumJS (本地优先，CDN 备用) -->
    <script>
        window.CESIUM_BASE_URL = 'node_modules/cesium/Build/Cesium/';
    </script>
    <link rel="stylesheet" href="node_modules/cesium/Build/Cesium/Widgets/widgets.css">
    <script src="node_modules/cesium/Build/Cesium/Cesium.js"></script>
    <script>
        if (typeof Cesium === 'undefined') {
            window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.116.0/Build/Cesium/';
            document.write('<link rel="stylesheet" href="' + window.CESIUM_BASE_URL + 'Widgets/widgets.css">');
            document.write('<script src="' + window.CESIUM_BASE_URL + 'Cesium.js"><\/script>');
        }
    </script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 地图容器 -->
    <div id="cesiumContainer"></div>

    <!-- 标题栏 -->
    <div id="titleBar">
        <span class="title">低空巡检系统</span>
        <span class="subtitle">3D City Visualization · Patrol Management</span>
        <span id="city-name" class="city-label">选择城市</span>
    </div>

    <!-- 城市切换栏 -->
    <div id="cityBar">
        <button class="city-btn" data-city="beijing">北京</button>
        <button class="city-btn" data-city="shanghai">上海</button>
        <button class="city-btn" data-city="guangzhou">广州</button>
        <button class="city-btn" data-city="shenzhen">深圳</button>
        <button class="city-btn" data-city="chongqing">重庆</button>
        <button class="city-btn" data-city="chengdu">成都</button>
        <button class="city-btn" data-city="xian">西安</button>
        <button class="city-btn" data-city="hangzhou">杭州</button>
    </div>

    <!-- 右侧控制面板 -->
    <div id="panel">
        <div class="panel-header">控制面板</div>
        <div class="panel-body">

            <!-- 图层控制 -->
            <div class="ctrl-group">
                <div class="ctrl-label">图层显示</div>
                <div class="ctrl-row">
                    <label>3D 建筑</label>
                    <input type="checkbox" id="toggle-buildings" checked>
                </div>
                <div class="ctrl-row">
                    <label>水体 / 河流</label>
                    <input type="checkbox" id="toggle-water" checked>
                </div>
                <div class="ctrl-row">
                    <label>道路网络</label>
                    <input type="checkbox" id="toggle-roads" checked>
                </div>
                <div class="ctrl-row">
                    <label>植被 / 公园</label>
                    <input type="checkbox" id="toggle-vegetation" checked>
                </div>
                <div class="ctrl-row">
                    <label>3D 真实地形</label>
                    <input type="checkbox" id="toggle-terrain">
                </div>
                <div class="ctrl-row">
                    <label>巡检路线</label>
                    <input type="checkbox" id="toggle-patrol">
                </div>
                <div class="ctrl-row">
                    <label>禁飞区域</label>
                    <input type="checkbox" id="toggle-nofly">
                </div>
            </div>

            <hr class="divider">

            <!-- 巡逻控制 -->
            <div class="ctrl-group">
                <div class="ctrl-label">巡逻控制</div>
                <div class="ctrl-row" style="margin-bottom:6px;">
                    <label>航线选择</label>
                    <select id="select-route" style="
                        background: rgba(255,255,255,0.1);
                        color: #e0e8f0;
                        border: 1px solid rgba(255,255,255,0.15);
                        border-radius: 6px;
                        padding: 4px 8px;
                        font-size: 12px;
                    ">
                        <option value="0">环形巡逻</option>
                        <option value="1">网格扫描</option>
                    </select>
                </div>
                <div style="display:flex; gap: 6px; margin: 8px 0;">
                    <button class="btn btn-success btn-sm" id="btn-play" style="flex:1;">开始</button>
                    <button class="btn btn-danger btn-sm" id="btn-reset" style="flex:1;">重置</button>
                </div>
                <div style="margin-top: 8px;">
                    <div class="ctrl-label">飞行速度</div>
                    <input type="range" class="ctrl-slider" id="speed-slider"
                           min="1" max="50" value="10" step="1">
                    <div class="slider-value" id="speed-value">10 m/s</div>
                </div>
                <div style="margin-top: 6px;">
                    <button class="btn btn-primary btn-sm" id="btn-flyto">飞至数据区</button>
                </div>
            </div>

            <hr class="divider">

            <!-- 统计信息 -->
            <div class="ctrl-group">
                <div class="ctrl-label">场景统计</div>
                <div class="ctrl-row"><span>建筑</span><span id="panel-buildings" style="color:#00d4ff;font-weight:600;">-</span></div>
                <div class="ctrl-row"><span>水体</span><span id="panel-water" style="color:#4fc3f7;font-weight:600;">-</span></div>
                <div class="ctrl-row"><span>道路</span><span id="panel-roads" style="color:#ffb74d;font-weight:600;">-</span></div>
                <div class="ctrl-row"><span>植被</span><span id="panel-vegetation" style="color:#81c784;font-weight:600;">-</span></div>
                <div class="ctrl-row">
                    <span>当前路线</span>
                    <span id="route-name" style="color:#00ff88;font-size:12px;">-</span>
                </div>
            </div>

        </div>
    </div>

    <!-- 底部状态栏 -->
    <div id="statusBar">
        <div class="stat-item">
            坐标: <span class="stat-value" id="stat-coord">-</span>
        </div>
        <div class="stat-item">
            高度: <span class="stat-value" id="stat-altitude">-</span>
        </div>
        <div class="stat-item">
            速度: <span class="stat-value" id="stat-speed">0 m/s</span>
        </div>
        <div class="stat-item">
            FPS: <span class="stat-value" id="stat-fps">-</span>
        </div>
        <div class="stat-item">
            建筑: <span class="stat-value" id="stat-buildings">-</span> 栋
        </div>
    </div>

    <!-- 建筑信息浮层 -->
    <div id="tooltip"></div>

    <!-- 加载提示 -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">初始化中...</div>
    </div>

    <!-- 应用入口 -->
    <script src="js/TileManager.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
