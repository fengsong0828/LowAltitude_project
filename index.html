<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>低空飞行器管理平台 v2.0</title>

    <!-- CesiumJS (本地优先，CDN 备用) -->
    <script>
        window.CESIUM_BASE_URL = 'node_modules/cesium/Build/Cesium/';
    </script>
    <link rel="stylesheet" href="node_modules/cesium/Build/Cesium/Widgets/widgets.css">
    <script src="node_modules/cesium/Build/Cesium/Cesium.js"></script>
    <script>
        if (typeof Cesium === 'undefined') {
            window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.116.0/Build/Cesium/';
            document.write('<link rel="stylesheet" href="' + window.CESIUM_BASE_URL + 'Widgets/widgets.css">');
            document.write('<script src="' + window.CESIUM_BASE_URL + 'Cesium.js"><\/script>');
        }
    </script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 地图容器 -->
    <div id="cesiumContainer"></div>

    <!-- 标题栏 -->
    <div id="titleBar">
        <span class="title">低空飞行器管理平台</span>
        <span class="subtitle">Low-Altitude Aircraft Management · v2.0</span>
        <span id="city-name" class="city-label">选择城市</span>
        <span id="title-stats" class="title-stats"></span>
    </div>

    <!-- 城市切换栏 -->
    <div id="cityBar">
        <button class="city-btn" data-city="beijing">北京</button>
        <button class="city-btn" data-city="shanghai">上海</button>
        <button class="city-btn" data-city="guangzhou">广州</button>
        <button class="city-btn" data-city="shenzhen">深圳</button>
        <button class="city-btn" data-city="chongqing">重庆</button>
        <button class="city-btn" data-city="chengdu">成都</button>
        <button class="city-btn" data-city="xian">西安</button>
        <button class="city-btn" data-city="hangzhou">杭州</button>
    </div>

    <!-- 左侧飞行器列表面板 -->
    <div id="fleet-panel">
        <div class="fp-header">
            <span>飞行器列表</span>
            <span id="fleet-stats" class="fp-stats">-</span>
        </div>
        <div id="fleet-list" class="fp-list">
            <div class="fp-empty">请选择城市</div>
        </div>
        <div id="ac-detail" class="fp-detail">
            <div class="ac-detail-empty">点击飞行器查看详情</div>
        </div>
    </div>

    <!-- 左下角告警面板 -->
    <div id="alert-panel">
        <div class="panel-header">实时告警 <span id="alert-count" class="alert-count-badge">0</span></div>
        <div id="alert-list" class="alert-scroll">
            <div class="alert-empty">暂无告警</div>
        </div>
    </div>

    <!-- 右侧面板：图层控制 + 摄像头并列 -->
    <div id="right-panels">
        <div id="panel" class="rp-section">
            <div class="panel-header">图层控制</div>
            <div class="panel-body">
                <div class="ctrl-group">
                    <div class="ctrl-row"><label>3D 建筑</label><input type="checkbox" id="toggle-buildings" checked></div>
                    <div class="ctrl-row"><label>水体/河流</label><input type="checkbox" id="toggle-water" checked></div>
                    <div class="ctrl-row"><label>道路网络</label><input type="checkbox" id="toggle-roads" checked></div>
                    <div class="ctrl-row"><label>植被/公园</label><input type="checkbox" id="toggle-vegetation" checked></div>
                    <div class="ctrl-row"><label>3D 真实地形</label><input type="checkbox" id="toggle-terrain"></div>
                    <div class="ctrl-row"><label>飞行器</label><input type="checkbox" id="toggle-aircraft" checked></div>
                    <div class="ctrl-row"><label>禁飞区域</label><input type="checkbox" id="toggle-nofly"></div>
                    <div class="ctrl-row"><label>空域网格</label><input type="checkbox" id="toggle-grid"></div>
                </div>
                <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:6px;margin-top:4px;">
                    <div style="font-size:10px;color:#889;margin-bottom:3px;">飞行器速度</div>
                    <div style="display:flex;align-items:center;gap:3px;margin-bottom:4px;">
                        <input type="range" id="speed-slider" min="1" max="80" value="20" style="flex:1;height:4px;">
                        <span id="speed-value" style="color:#00d4ff;font-size:10px;width:38px;">20 m/s</span>
                    </div>
                    <button class="btn btn-sm" id="btn-pause" style="width:100%;margin-bottom:2px;background:#28a745;color:#fff;">暂停仿真</button>
                    <button class="btn btn-primary btn-sm" id="btn-flyto" style="width:100%;margin-bottom:2px;">飞至数据区</button>
                    <button class="btn btn-sm" id="btn-commloss" style="width:100%;margin-bottom:2px;background:#dc3545;color:#fff;">通信丢失</button>
                    <button class="btn btn-primary btn-sm" id="btn-flightplan" style="width:100%;">提交飞行计划</button>
                </div>
            </div>
        </div>
        <!-- 摄像头区域由 JS 动态插入此处 -->
    </div>

    <!-- 底部状态栏 -->
    <div id="statusBar">
        <div class="stat-item">坐标: <span class="stat-value" id="stat-coord">-</span></div>
        <div class="stat-item">高度: <span class="stat-value" id="stat-altitude">-</span></div>
        <div class="stat-item">FPS: <span class="stat-value" id="stat-fps">-</span></div>
        <div class="stat-item">建筑: <span class="stat-value" id="stat-buildings">-</span> 栋</div>
    </div>

    <!-- 建筑信息浮层 -->
    <div id="tooltip"></div>

    <!-- 加载提示 -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">初始化中...</div>
    </div>

    <!-- DEBUG: 舰队状态 -->
    <div id="debug-panel" style="position:absolute;bottom:36px;left:260px;color:#0f0;font-size:10px;z-index:300;background:rgba(0,0,0,0.8);padding:4px 8px;border-radius:4px;cursor:pointer;" onclick="this.style.display='none'" title="点击关闭">舰队: 等待加载...</div>

    <!-- 飞行计划模态框 -->
    <div id="flightplan-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:998;background:rgba(0,0,0,0.5);"></div>
    <div id="flightplan-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:rgba(15,25,40,0.95);border:1px solid rgba(0,212,255,0.3);border-radius:10px;padding:16px;width:340px;color:#e0e8f0;">
        <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#00d4ff;">提交飞行计划</div>
        <div id="fp-pick-hint" style="font-size:11px;color:#ffaa00;margin-bottom:6px;display:none;">🖱 请在地图上点击选择位置...</div>
        <div class="ctrl-row" style="margin-bottom:4px;">
            <label>起点</label>
            <span style="flex:1;text-align:right;">
                <span id="fp-dep-text" style="color:#888;font-size:11px;">未选择</span>
                <button class="btn btn-primary btn-sm" id="btn-fp-pick-dep" style="padding:2px 8px;font-size:10px;margin-left:4px;">选点</button>
            </span>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:6px;">
            <input id="fp-dep-lng" type="text" style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:11px;" placeholder="经度" readonly>
            <input id="fp-dep-lat" type="text" style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:11px;" placeholder="纬度" readonly>
        </div>
        <div class="ctrl-row" style="margin-bottom:4px;">
            <label>终点</label>
            <span style="flex:1;text-align:right;">
                <span id="fp-arr-text" style="color:#888;font-size:11px;">未选择</span>
                <button class="btn btn-primary btn-sm" id="btn-fp-pick-arr" style="padding:2px 8px;font-size:10px;margin-left:4px;">选点</button>
            </span>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:6px;">
            <input id="fp-arr-lng" type="text" style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:11px;" placeholder="经度" readonly>
            <input id="fp-arr-lat" type="text" style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 6px;border-radius:4px;font-size:11px;" placeholder="纬度" readonly>
        </div>
        <div id="fp-result" style="margin:8px 0;font-size:11px;"></div>
        <div style="display:flex;gap:6px;">
            <button class="btn btn-primary btn-sm" id="btn-fp-submit" style="flex:1;">提交评估</button>
            <button class="btn btn-sm" id="btn-fp-close" style="flex:1;background:#444;color:#aaa;">取消</button>
        </div>
    </div>

    <!-- 应用入口 -->
    <script src="js/TileManager.js"></script>
    <script src="js/AlertSystem.js"></script>
    <script src="js/CameraView.js"></script>
    <script src="js/AircraftManager.js"></script>
    <script src="js/EngineClient.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
